name: deepseek-v3
description: >
  DeepSeek-V3 — MoE LLM with strong reasoning and coding capabilities.
  Supports SFT for chat, instruction following, and code generation.

model_name_or_path: "deepseek-ai/DeepSeek-V3"
model_family: "LLM"
stage: "SFT"
template: "deepseek3"
attn_implementation: "flashmask"
freeze_config: ""
max_seq_len: 131072
dataset_type: "erniekit"

model_defaults:
  use_lora: true
  lora_rank: 64
  lora_alpha: 128
  target_modules: ".*attn.*"

finetuning_defaults:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1e-5
  num_train_epochs: 3
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  sharding: "stage2"

hyperparam_space:
  finetuning.learning_rate:
    type: log
    min: 1e-7
    max: 1e-3
    initial: [5e-6, 1e-5, 2e-5, 5e-5]
  finetuning.per_device_train_batch_size:
    type: linear
    min: 1
    max: 8
    initial: [1, 2, 4]
    discrete: true
  model.lora_rank:
    type: linear
    min: 2
    max: 64
    initial: [8, 16, 32]
    discrete: true

supported_data_formats:
  - erniekit-jsonl
  - jsonl
  - parquet
  - csv
  - directory
