name: ernie4_5
description: >
  ERNIE 4.5 — Baidu's MoE LLM with strong Chinese-English bilingual capabilities.
  Supports SFT for chat, instruction following, and domain adaptation.

model_name_or_path: "PaddlePaddle/ernie45-sft-full"
model_family: "LLM"
stage: "SFT"
template: "ernie"
attn_implementation: "flashmask"
freeze_config: ""
max_seq_len: 8192
dataset_type: "erniekit"

model_defaults:
  use_lora: false
  lora_rank: 8
  lora_alpha: 16
  target_modules: ".*attn.*"

finetuning_defaults:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  num_train_epochs: 3
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  sharding: "stage1"
  recompute_granularity: "full"
  recompute_method: "uniform"
  recompute_num_layers: 1

hyperparam_space:
  finetuning.learning_rate:
    type: log
    min: 1e-6
    max: 1e-3
    initial: [1e-5, 3e-5, 1e-4, 3e-4]
  finetuning.per_device_train_batch_size:
    type: linear
    min: 1
    max: 16
    initial: [1, 2, 4]
    discrete: true
  model.lora_rank:
    type: linear
    min: 2
    max: 64
    initial: [4, 8, 16]
    discrete: true

supported_data_formats:
  - erniekit-jsonl
  - jsonl
  - parquet
  - csv
  - directory
