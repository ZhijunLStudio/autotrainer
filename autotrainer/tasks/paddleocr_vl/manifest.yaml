name: paddleocr-vl
description: >
  PaddleOCR-VL — vision-language model for OCR tasks.
  Supports detection and recognition via the PaddleFormers framework.

model_name_or_path: "PaddlePaddle/PaddleOCR-VL"
model_family: "VL"
stage: "VL-SFT"
template: "paddleocr_vl"
attn_implementation: "flashmask"
freeze_config: "freeze_vision freeze_aligner"
max_seq_len: 8192
dataset_type: "messages"

model_defaults:
  use_lora: false
  lora_rank: 8
  lora_alpha: 16
  target_modules: ".*attn.*"

finetuning_defaults:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  num_train_epochs: 3
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  fp16_opt_level: "O2"
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  evaluation_strategy: "steps"
  save_strategy: "steps"
  save_total_limit: 3
  sharding: "stage1"
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  recompute_granularity: "full"
  recompute_method: "uniform"
  recompute_num_layers: 1

hyperparam_space:
  finetuning.learning_rate:
    type: log
    min: 1e-6
    max: 1e-3
    initial: [1e-5, 3e-5, 1e-4, 3e-4]
  finetuning.per_device_train_batch_size:
    type: linear
    min: 1
    max: 16
    initial: [1, 2, 4]
    discrete: true
  model.lora_rank:
    type: linear
    min: 2
    max: 64
    initial: [4, 8, 16]
    discrete: true

supported_data_formats:
  - erniekit-jsonl
  - jsonl
  - parquet
  - csv
  - directory

launch_command: paddleformers/dist_train.py
launch_env:
  PADDLEFORMERS_HOME: "${PADDLEFORMERS_ROOT}"
