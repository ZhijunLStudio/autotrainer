name: qwen3-vl
description: >
  Qwen3-VL — vision-language model with reasoning capabilities.
  Supports image/video understanding, OCR, and visual reasoning.

model_name_or_path: "Qwen/Qwen3-VL-8B"
model_family: "VL"
stage: "VL-SFT"
template: "qwen3_vl"
attn_implementation: "flashmask"
freeze_config: "freeze_vision freeze_aligner"
max_seq_len: 32768
dataset_type: "erniekit"

model_defaults:
  use_lora: true
  lora_rank: 64
  lora_alpha: 128
  target_modules: ".*attn.*"

finetuning_defaults:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1e-4
  num_train_epochs: 3
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  sharding: "stage1"

hyperparam_space:
  finetuning.learning_rate:
    type: log
    min: 1e-6
    max: 1e-3
    initial: [1e-5, 3e-5, 1e-4, 3e-4]
  finetuning.per_device_train_batch_size:
    type: linear
    min: 1
    max: 8
    initial: [1, 2, 4]
    discrete: true
  model.lora_rank:
    type: linear
    min: 2
    max: 64
    initial: [8, 16, 32]
    discrete: true

supported_data_formats:
  - erniekit-jsonl
  - jsonl
  - parquet
  - csv
  - directory
